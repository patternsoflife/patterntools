name: Publish to npm

on:
  push:
    branches:
      - production
    paths:
      - 'patterns-ts/**'
      - 'patterns-ts-cli/**'

permissions:
  contents: read
  id-token: write  # Required for OIDC
  packages: write

jobs:
  detect-changes:
    uses: ./.github/workflows/detect-changes.yaml

  quality-checks:
    needs: detect-changes
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - package: patterns-ts
            changed: ${{ needs.detect-changes.outputs.patterns-ts == 'true' }}
          - package: patterns-ts-cli
            changed: ${{ needs.detect-changes.outputs.patterns-ts-cli == 'true' }}

    steps:
      - name: Checkout repository
        if: matrix.changed == true
        uses: actions/checkout@v4

      - name: Run quality checks
        if: matrix.changed == true
        uses: ./.github/actions/quality-checks-ts
        with:
          package: ${{ matrix.package }}

  publish:
    needs: [detect-changes, quality-checks]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - package: patterns-ts
            changed: ${{ needs.detect-changes.outputs.patterns-ts == 'true' }}
          - package: patterns-ts-cli
            changed: ${{ needs.detect-changes.outputs.patterns-ts-cli == 'true' }}

    steps:
      - name: Checkout repository
        if: matrix.changed == true
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: matrix.changed == true
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: matrix.changed == true
        run: |
          cd ${{ matrix.package }}
          npm ci

      - name: Build package
        if: matrix.changed == true
        run: |
          cd ${{ matrix.package }}
          npm run build
      
      - name: Add license
        if: matrix.changed == true
        run: cp LICENSE ${{ matrix.package }}/

      - name: Publish package
        if: matrix.changed == true
        run: |
          cd ${{ matrix.package }}
          VERSION=$(jq -r .version package.json)

          if echo "$VERSION" | grep -q '-'; then
            TAG=$(echo "$VERSION" | tr -cd 'a-zA-Z')
            echo "Publishing ${{ matrix.package }} version $VERSION with tag $TAG"
            npm publish --access public --tag "$TAG"
          else
            echo "Publishing ${{ matrix.package }} version $VERSION as latest"
            npm publish --access public
          fi
