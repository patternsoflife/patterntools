name: Publish to npm

on:
  push:
    branches:
      - production

permissions:
  contents: read
  id-token: write  # Required for OIDC
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package:
          - patterns-ts
          - patterns-ts-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Publish package
        run: |
          cd ${{ matrix.package }}
          VERSION=$(jq -r .version package.json)
          echo "Publishing ${{ matrix.package }} version $VERSION"
          npm publish --tag "$VERSION" --access public
