name: Publish to npm

on:
  push:
    branches:
      - production

permissions:
  contents: read
  id-token: write  # Required for NPM provenance
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package:
          - patterns-ts
          - patterns-ts-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to detect previous commits to get version changes

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org/'
          always-auth: true

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Detect package version changes
        id: version_changed
        run: |
          PACKAGE_DIR=${{ matrix.package }}

          echo "Checking version change in $PACKAGE_DIR/package.json"

          # Get current version
          CURRENT_VERSION=$(jq -r '.version' $PACKAGE_DIR/package.json)
          echo "Current version: $CURRENT_VERSION"

          # Get previous version from git
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            PREV_VERSION=$(git show HEAD~1:"$PACKAGE_DIR/package.json" 2>/dev/null | jq -r .version || echo "")
          else
            PREV_VERSION=""
          fi
          echo "Previous version: $PREV_VERSION"

          if [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            echo "Package version has changed."
            echo "::set-output name=CHANGED::true"
          else
            echo "Package version has not changed."
            echo "::set-output name=CHANGED::false"
          fi

      - name: Publish package
        if: steps.version_changed.outputs.CHANGED == 'true'
        run: |
          cd ${{ matrix.package }}
          echo "Publishing ${{ matrix.package }} version $(jq -r .version package.json)"
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
