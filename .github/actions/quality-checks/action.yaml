name: 'Quality Checks'
description: 'Run linting and typecheck for a package'

inputs:
  package:
    description: 'Package name'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24.x'

    - name: Install dependencies
      shell: bash
      run: |
        cd ${{ inputs.package }}
        npm ci

    - name: Run linting
      shell: bash
      run: |
        cd ${{ inputs.package }}
        npm run lint

    - name: Run typecheck
      shell: bash
      run: |
        cd ${{ inputs.package }}
        npm run typecheck
